name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate enrichment overlay
        run: npm run validate:enrichments
      - name: Typecheck
        run: npm run typecheck
      - name: Build data (referential integrity + strength parse)
        run: npm run build:data
